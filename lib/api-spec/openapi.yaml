openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Human Second Brain API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: memories
    description: Memory CRUD operations
  - name: files
    description: File upload operations
  - name: chat
    description: AI chat with memory (RAG)
  - name: search
    description: Semantic memory search
  - name: stats
    description: Dashboard stats and activity
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /memories:
    get:
      operationId: listMemories
      tags: [memories]
      summary: List all memories for the current user
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: tag
          in: query
          required: false
          schema:
            type: string
        - name: q
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of memories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Memory"
    post:
      operationId: createMemory
      tags: [memories]
      summary: Create a new memory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemoryInput"
      responses:
        "201":
          description: Created memory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Memory"

  /memories/{id}:
    get:
      operationId: getMemory
      tags: [memories]
      summary: Get a single memory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Memory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Memory"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateMemory
      tags: [memories]
      summary: Update a memory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemoryUpdate"
      responses:
        "200":
          description: Updated memory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Memory"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteMemory
      tags: [memories]
      summary: Delete a memory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /files:
    get:
      operationId: listFiles
      tags: [files]
      summary: List uploaded files
      responses:
        "200":
          description: List of files
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UploadedFile"
    post:
      operationId: uploadFile
      tags: [files]
      summary: Upload a file (PDF, TXT, DOCX)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/FileUploadForm"
      responses:
        "201":
          description: Uploaded file with extracted text saved as memory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadedFile"

  /files/{id}:
    delete:
      operationId: deleteFile
      tags: [files]
      summary: Delete an uploaded file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /chat/conversations:
    get:
      operationId: listConversations
      tags: [chat]
      summary: List all chat conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
    post:
      operationId: createConversation
      tags: [chat]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /chat/conversations/{id}:
    get:
      operationId: getConversation
      tags: [chat]
      summary: Get a conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteConversation
      tags: [chat]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /chat/conversations/{id}/messages:
    post:
      operationId: sendMessage
      tags: [chat]
      summary: Send a message and receive an AI response (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "200":
          description: SSE stream of assistant response
          content:
            text/event-stream: {}

  /search:
    post:
      operationId: searchMemories
      tags: [search]
      summary: Semantic search over memories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchQuery"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

  /stats/dashboard:
    get:
      operationId: getDashboardStats
      tags: [stats]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /stats/activity:
    get:
      operationId: getRecentActivity
      tags: [stats]
      summary: Get recent activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Memory:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        title:
          type: string
        content:
          type: string
        type:
          type: string
          enum: [thought, note, learning, idea, journal, task]
        category:
          type: string
          enum: [work, personal, learning, ideas, health, business]
        tags:
          type: array
          items:
            type: string
        isPinned:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - title
        - content
        - type
        - category
        - tags
        - isPinned
        - createdAt
        - updatedAt

    MemoryInput:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        type:
          type: string
          enum: [thought, note, learning, idea, journal, task]
        category:
          type: string
          enum: [work, personal, learning, ideas, health, business]
        tags:
          type: array
          items:
            type: string
        isPinned:
          type: boolean
      required:
        - title
        - content
        - type
        - category

    MemoryUpdate:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        type:
          type: string
          enum: [thought, note, learning, idea, journal, task]
        category:
          type: string
          enum: [work, personal, learning, ideas, health, business]
        tags:
          type: array
          items:
            type: string
        isPinned:
          type: boolean

    UploadedFile:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        filename:
          type: string
        originalName:
          type: string
        mimeType:
          type: string
        size:
          type: integer
        memoryId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - filename
        - originalName
        - mimeType
        - size
        - memoryId
        - createdAt

    Conversation:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - title
        - createdAt

    ConversationInput:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    Message:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    ConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
      required:
        - id
        - userId
        - title
        - createdAt
        - messages

    MessageInput:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    SearchQuery:
      type: object
      properties:
        query:
          type: string
        limit:
          type: integer
      required:
        - query

    SearchResult:
      type: object
      properties:
        memory:
          $ref: "#/components/schemas/Memory"
        score:
          type: number
      required:
        - memory
        - score

    SearchResults:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchResult"
        query:
          type: string
      required:
        - results
        - query

    DashboardStats:
      type: object
      properties:
        totalMemories:
          type: integer
        totalFiles:
          type: integer
        totalConversations:
          type: integer
        memoriesByType:
          type: object
          additionalProperties:
            type: integer
        memoriesByCategory:
          type: object
          additionalProperties:
            type: integer
        recentMemoriesCount:
          type: integer
      required:
        - totalMemories
        - totalFiles
        - totalConversations
        - memoriesByType
        - memoriesByCategory
        - recentMemoriesCount

    ActivityItem:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [memory_created, memory_updated, file_uploaded, chat_started]
        title:
          type: string
        description:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - title
        - description
        - createdAt

    FileUploadForm:
      type: object
      properties:
        file:
          type: string
          format: binary
        category:
          type: string
        tags:
          type: string
      required:
        - file

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
