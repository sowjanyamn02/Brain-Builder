kind = "web"
previewPath = "/"
title = "Human Second Brain"
version = "1.0.0"
id = "artifacts/second-brain"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20447

[services.development]
run = "pnpm --filter @workspace/second-brain run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/second-brain", "run", "build" ]
publicDir = "artifacts/second-brain/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20447"
BASE_PATH = "/"
